<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="wrapper">
        <h1>Weather App</h1>
        
        <div class="tab-container">
            <p class="tab" data-userWeather>Your Weather</p>
            <p class="tab" data-searchWeather>Search Weather</p>
        </div>
        
        <div class="container">
            <!-- grant location container -->
            <div class="grant-location-container sub-container">
                <img src="./Images/location.png" 
                alt="gps"
                loading="lazy"
                width="80"
                height="80">

                <p>Grant Location Access</p>
                <p>Allow Access To Get Weather Information</p>

                <button class="btn" data-grantAccess>Grant Access</button>
            </div>

            <!-- search weather container -->
            <form class="form-container" data-searchForm>
                <input type="text" placeholder="Search for city ..." data-searchInput>
                <button class="btn">
                    <img src="./Images/search.png" 
                    alt="search"
                    loading="lazy"
                    width="20"
                    height="20">
                </button>
            </form>

            <!-- loading screen container -->
            <div class="loading-container sub-container">
                <img src="./Images/loading.gif" 
                alt="gif"
                loading="lazy"
                width="150"
                height="150">
                <p>Loading</p>
            </div>

            <div class="not-found-container sub-container">
                <img src="./Images/not-found.png" 
                alt="not-found"
                loading="lazy"
                width="250"
                height="250">
            </div>

            <!-- show weather info container -->
            <div class="user-info-container sub-container">
                <!-- city name and flag -->
                <div class="name">
                    <p data-cityName></p>
                    <img data-countryIcon>
                </div>

                <!-- weather description -->
                <p data-weatherDesc></p>

                <!-- weather icon -->
                <img data-weatherIcon>

                <!-- temperature -->
                <p data-temp></p>

                <!-- three parameters -->
                <div class="parameter-container">
                    <div class="parameter">
                        <img src="./Images/wind.png" 
                        alt="wind"
                        loading="lazy">

                        <p>Windspeed</p>
                        <p data-windSpeed></p>
                    </div>

                    <div class="parameter">
                        <img src="./Images/humidity.png" 
                        alt="humidity"
                        loading="lazy">

                        <p>Humidity</p>
                        <p data-humidity></p>
                    </div>

                    <div class="parameter">
                        <img src="./Images/cloud.png" 
                        alt="clouds"
                        loading="lazy">

                        <p>Clouds</p>
                        <p data-cloudiness></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
    <script src="https://kit.fontawesome.com/58a810656e.js" crossorigin="anonymous"></script>
</body>
</html>
